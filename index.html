<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visitor Registration | SecureGate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .form-container {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .loading {
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2a5298;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            background: #f8f9fa;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }
        
        .connection-status {
            background: #fff3cd;
            color: #856404;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .header {
                padding: 24px 16px;
            }
            .form-container {
                padding: 20px;
            }
            input, select {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏢</div>
            <h1>Visitor Registration</h1>
            <p>Please fill in your details to enter</p>
        </div>
        
        <div class="form-container">
            <div id="connectionStatus" class="connection-status">🔄 Checking connection...</div>
            <div id="successMessage" class="alert success" style="display: none;"></div>
            <div id="errorMessage" class="alert error" style="display: none;"></div>
            <div id="infoMessage" class="alert info" style="display: none;"></div>
            
            <form id="visitorForm">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="name" required placeholder="Enter your full name" autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="10-digit mobile number" autocomplete="tel" pattern="[0-9]{10}" maxlength="10">
                </div>
                
                <div class="form-group">
                    <label>Visiting Flat Number *</label>
                    <input type="text" id="flat" required placeholder="e.g., 204" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>Purpose *</label>
                    <select id="purpose" required>
                        <option value="">Select purpose</option>
                        <option value="delivery">📦 Food / Package Delivery</option>
                        <option value="guest">👤 Guest / Friend</option>
                        <option value="service">🔧 Service / Maintenance</option>
                        <option value="other">❓ Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Vehicle Number (Optional)</label>
                    <input type="text" id="vehicle" placeholder="e.g., KA-01-AB-1234" autocomplete="off">
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">Submit & Notify Resident</button>
                
                <div id="loadingSpinner" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Submitting...</p>
                </div>
            </form>
        </div>
        
        <div class="footer">
            <p>Your data is collected for security purposes only</p>
            <p>⚠️ Please wait at the gate after submission</p>
        </div>
    </div>
    
    <script>
        // =====================================================
        // PRODUCTION CONFIGURATION
        // =====================================================
        
        // Backend URL (Your Render backend)
        const API_URL = 'https://visitor-management-backend-1-aveq.onrender.com';
        
        // Apartment ID - Green Valley Apartments
        const APARTMENT_ID = '192734af-154b-4be8-aa42-3018bd5c648b';
        
        // Retry configuration
        const MAX_RETRIES = 2;
        const RETRY_DELAY = 1000;
        
        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        
        async function fetchWithRetry(url, options, retries = MAX_RETRIES) {
            try {
                const response = await fetch(url, options);
                if (!response.ok && retries > 0) {
                    console.log(`Retrying... (${MAX_RETRIES - retries + 1})`);
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                    return fetchWithRetry(url, options, retries - 1);
                }
                return response;
            } catch (error) {
                if (retries > 0) {
                    console.log(`Retry due to error: ${error.message}`);
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                    return fetchWithRetry(url, options, retries - 1);
                }
                throw error;
            }
        }
        
        // =====================================================
        // TEST CONNECTION ON PAGE LOAD
        // =====================================================
        
        async function testConnection() {
            const statusDiv = document.getElementById('connectionStatus');
            try {
                const response = await fetchWithRetry(`${API_URL}/api/apartments`, { method: 'GET' }, 1);
                
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `✅ Connected to server. Found ${data.apartments?.length || 0} apartments.`;
                    statusDiv.style.background = '#d4edda';
                    statusDiv.style.color = '#155724';
                    
                    // Hide after 3 seconds
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                } else {
                    statusDiv.innerHTML = '⚠️ Server responded but with error. Please try again.';
                    statusDiv.style.background = '#fff3cd';
                    statusDiv.style.color = '#856404';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Cannot connect to server. Please check your internet connection.';
                statusDiv.style.background = '#f8d7da';
                statusDiv.style.color = '#721c24';
                console.error('Connection test failed:', error);
            }
        }
        
        // =====================================================
        // FORM SUBMISSION
        // =====================================================
        
        const form = document.getElementById('visitorForm');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');
        const infoDiv = document.getElementById('infoMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const submitBtn = document.getElementById('submitBtn');
        
        function showMessage(element, message, isError = false, isInfo = false) {
            element.textContent = message;
            element.style.display = 'block';
            if (isError) {
                element.className = 'alert error';
            } else if (isInfo) {
                element.className = 'alert info';
            } else {
                element.className = 'alert success';
            }
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
        
        // Phone number formatting
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '').slice(0, 10);
            e.target.value = value;
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const flat = document.getElementById('flat').value.trim().toUpperCase();
            const purpose = document.getElementById('purpose').value;
            const vehicle = document.getElementById('vehicle').value.trim().toUpperCase();
            
            // Validation
            if (!name || !phone || !flat || !purpose) {
                showMessage(errorDiv, 'Please fill in all required fields', true);
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showMessage(errorDiv, 'Please enter a valid 10-digit phone number', true);
                return;
            }
            
            if (flat.length < 1) {
                showMessage(errorDiv, 'Please enter a valid flat number', true);
                return;
            }
            
            // Show info message
            showMessage(infoDiv, 'Submitting your request...', false, true);
            
            // Disable form during submission
            submitBtn.disabled = true;
            loadingSpinner.style.display = 'block';
            infoDiv.style.display = 'none';
            
            try {
                console.log('Submitting to:', `${API_URL}/api/apartments/${APARTMENT_ID}/visitors/register`);
                console.log('Data:', { name, phone, flat, purpose, vehicle });
                
                const response = await fetchWithRetry(`${API_URL}/api/apartments/${APARTMENT_ID}/visitors/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        phone,
                        flat,
                        purpose,
                        vehicle: vehicle || null,
                        selfie: null
                    })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok && data.success) {
                    showMessage(successDiv, `
                        ✅ Registration Successful!
                        Approval ID: ${data.approvalId}
                        Please wait at the gate. Security will call you shortly.
                    `);
                    form.reset();
                } else {
                    showMessage(errorDiv, data.error || 'Registration failed. Please try again.', true);
                }
                
            } catch (error) {
                console.error('Submission error:', error);
                showMessage(errorDiv, `Connection error. Please check your internet and try again.`, true);
            } finally {
                submitBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                infoDiv.style.display = 'none';
            }
        });
        
        // Test connection on page load
        testConnection();
    </script>
</body>
</html>
