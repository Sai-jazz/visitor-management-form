<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Visitor Registration | Security Gate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .form-container {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        
        .photo-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .selfie-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .selfie-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .secondary-btn {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2a5298;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            background: #f8f9fa;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }
        
        .footer p:first-child {
            margin-bottom: 8px;
        }
        
        .footer p:last-child {
            color: #ff9800;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 24px 16px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏢</div>
            <h1>Visitor Registration</h1>
            <p>Please fill in your details to enter the premises</p>
        </div>
        
        <div class="form-container">
            <div id="successMessage" class="alert success" style="display: none;"></div>
            <div id="errorMessage" class="alert error" style="display: none;"></div>
            
            <form id="visitorForm">
                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="10-digit mobile number">
                </div>
                
                <div class="form-group">
                    <label for="flat">Visiting Flat Number *</label>
                    <input type="text" id="flat" name="flat" required placeholder="e.g., 204, Tower A-302">
                </div>
                
                <div class="form-group">
                    <label for="purpose">Purpose of Visit *</label>
                    <select id="purpose" name="purpose" required>
                        <option value="">Select purpose</option>
                        <option value="delivery">📦 Food / Package Delivery</option>
                        <option value="guest">👤 Guest / Friend</option>
                        <option value="service">🔧 Service / Maintenance</option>
                        <option value="other">❓ Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="vehicle">Vehicle Number (Optional)</label>
                    <input type="text" id="vehicle" name="vehicle" placeholder="e.g., KA-01-AB-1234">
                </div>
                
                <div class="form-group">
                    <label>Take a Selfie (Optional)</label>
                    <div class="photo-section">
                        <div id="selfiePreview" class="selfie-preview"></div>
                        <button type="button" id="captureBtn" class="secondary-btn">📸 Capture Photo</button>
                        <input type="file" id="photoUpload" accept="image/*" style="display: none;">
                        <input type="hidden" id="selfieData">
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">Submit & Notify Resident</button>
                
                <div id="loadingSpinner" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Submitting...</p>
                </div>
            </form>
        </div>
        
        <div class="footer">
            <p>Your data is collected for security purposes only</p>
            <p>⚠️ Please wait at the gate after submission</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000';
        
        const form = document.getElementById('visitorForm');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const submitBtn = document.getElementById('submitBtn');
        const captureBtn = document.getElementById('captureBtn');
        const photoUpload = document.getElementById('photoUpload');
        const selfiePreview = document.getElementById('selfiePreview');
        const selfieData = document.getElementById('selfieData');
        
        // Camera capture
        captureBtn.addEventListener('click', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.play();
                        
                        const modal = document.createElement('div');
                        modal.style.position = 'fixed';
                        modal.style.top = '0';
                        modal.style.left = '0';
                        modal.style.width = '100%';
                        modal.style.height = '100%';
                        modal.style.backgroundColor = 'rgba(0,0,0,0.9)';
                        modal.style.zIndex = '1000';
                        modal.style.display = 'flex';
                        modal.style.alignItems = 'center';
                        modal.style.justifyContent = 'center';
                        modal.style.flexDirection = 'column';
                        
                        video.style.width = '100%';
                        video.style.maxWidth = '400px';
                        video.style.borderRadius = '12px';
                        
                        const captureButton = document.createElement('button');
                        captureButton.textContent = 'Capture';
                        captureButton.style.marginTop = '20px';
                        captureButton.style.padding = '12px 24px';
                        captureButton.style.backgroundColor = '#2a5298';
                        captureButton.style.color = 'white';
                        captureButton.style.border = 'none';
                        captureButton.style.borderRadius = '24px';
                        captureButton.style.cursor = 'pointer';
                        
                        captureButton.onclick = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                            
                            selfiePreview.innerHTML = `<img src="${dataURL}" alt="Selfie">`;
                            selfieData.value = dataURL;
                            
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(modal);
                        };
                        
                        modal.appendChild(video);
                        modal.appendChild(captureButton);
                        document.body.appendChild(modal);
                    })
                    .catch(err => {
                        console.error('Camera error:', err);
                        photoUpload.click();
                    });
            } else {
                photoUpload.click();
            }
        });
        
        photoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selfiePreview.innerHTML = `<img src="${e.target.result}" alt="Selfie">`;
                    selfieData.value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        function showMessage(element, message, isError = false) {
            element.textContent = message;
            element.style.display = 'block';
            element.className = `alert ${isError ? 'error' : 'success'}`;
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const flat = document.getElementById('flat').value.trim();
            const purpose = document.getElementById('purpose').value;
            const vehicle = document.getElementById('vehicle').value.trim();
            const selfie = selfieData.value;
            
            if (!name || !phone || !flat || !purpose) {
                showMessage(errorDiv, 'Please fill in all required fields', true);
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showMessage(errorDiv, 'Please enter a valid 10-digit phone number', true);
                return;
            }
            
            submitBtn.disabled = true;
            loadingSpinner.style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/api/visitors/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        phone,
                        flat,
                        purpose,
                        vehicle,
                        selfie
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(successDiv, `
                        ✅ Registration Successful!<br>
                        Approval ID: ${data.approvalId}<br>
                        Please wait at the gate. Security will call you shortly.
                    `);
                    form.reset();
                    selfiePreview.innerHTML = '';
                    selfieData.value = '';
                } else {
                    showMessage(errorDiv, data.error || 'Registration failed', true);
                }
                
            } catch (error) {
                console.error('Submission error:', error);
                showMessage(errorDiv, 'Network error. Please try again.', true);
            } finally {
                submitBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
